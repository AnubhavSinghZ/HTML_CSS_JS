<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Glass Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <div class="bg-glow blob-1"></div>
  <div class="bg-glow blob-2"></div>

  <div class="calculator">
    <div class="screen">
      <div class="history" id="history"></div>
      <div class="output" id="output">0</div>
    </div>

    <div class="buttons">
      <button class="btn action" onclick="clearScreen()">C</button>
      <button class="btn action" onclick="appendValue('/')">÷</button>
      <button class="btn action" onclick="appendValue('*')">×</button>
      <button class="btn action" onclick="backspace()"><i class="ti ti-backspace"></i></button>

      <button class="btn" onclick="appendValue('7')">7</button>
      <button class="btn" onclick="appendValue('8')">8</button>
      <button class="btn" onclick="appendValue('9')">9</button>
      <button class="btn action" onclick="appendValue('-')">−</button>

      <button class="btn" onclick="appendValue('4')">4</button>
      <button class="btn" onclick="appendValue('5')">5</button>
      <button class="btn" onclick="appendValue('6')">6</button>
      <button class="btn action" onclick="appendValue('+')">+</button>

      <button class="btn" onclick="appendValue('1')">1</button>
      <button class="btn" onclick="appendValue('2')">2</button>
      <button class="btn" onclick="appendValue('3')">3</button>
      <button class="btn equal" onclick="calculate()">=</button>

      <button class="btn zero" onclick="appendValue('0')">0</button>
      <button class="btn" onclick="appendValue('.')">.</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
